<h1 class="page-title">Repository GitHub</h1>

<p class="lead">
Elenco aggiornato automaticamente delle repository pubbliche presenti sul mio
<a href="https://github.com/AndreaMartinLavoro" target="_blank" rel="noopener">profilo GitHub</a>.
</p>

<div id="repos" class="grid">
<div class="repo-status">Caricamento repository...</div>
</div>

</main>

<script src="js/app.js"></script>

<script>
const username = "AndreaMartinLavoro";

async function loadRepos(){

    const container = document.getElementById("repos");

    try{

        const response = await fetch(`https://api.github.com/users/${username}/repos`);

        if(!response.ok)
            throw new Error();

        let repos = await response.json();

        repos = repos
            .filter(repo => !repo.fork)
            .sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));

        container.innerHTML = "";

        repos.forEach(repo=>{

            const updated = new Date(repo.updated_at)
                .toLocaleDateString("it-IT",{
                    day:"2-digit",
                    month:"long",
                    year:"numeric"
                });

            const card = document.createElement("a");
            card.className = "card card-link";
            card.href = repo.html_url;
            card.target = "_blank";
            card.rel = "noopener";

            card.innerHTML = `
                <span class="tag">${repo.language ?? "N/D"}</span>

                <h3>${repo.name}</h3>

                <p>${repo.description ?? "Nessuna descrizione disponibile."}</p>

                <div class="repo-meta">
                    <span>★ ${repo.stargazers_count}</span>
                    <span>Aggiornato: ${updated}</span>
                </div>
            `;

            container.appendChild(card);

        });

        if(repos.length===0){
            container.innerHTML = "<div class='repo-status'>Nessuna repository pubblica trovata.</div>";
        }

    }catch(e){

        container.innerHTML = "<div class='repo-status'>Impossibile recuperare le repository da GitHub.</div>";

    }

}

loadRepos();
</script>
