<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">

<title>Minimal Flappy</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    touch-action:none;
}

body{
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}


#menuBtn,
#backBtn{

    position:fixed;
    top:20px;
    right:20px;

    width:52px;
    height:52px;

    border:0;
    border-radius:50%;

    background:white;
    font-size:24px;

    z-index:10;

}

#backBtn{

    left:20px;
    right:auto;

    display:flex;
    align-items:center;
    justify-content:center;

    text-decoration:none;
    color:#000;

}


#pause{

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.8);

    display:none;

    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;

}


#pause button{

    display:block;

    width:150px;
    height:45px;

    margin:10px;

}

</style>

</head>


<body>


<a id="backBtn" href="games.html" aria-label="Torna al sito">←</a>
<button id="menuBtn">☰</button>


<div id="pause">

<div>

<h2>Pausa</h2>

<button id="resume">
Riprendi
</button>

<button id="exit">
Esci
</button>

</div>

</div>


<canvas id="game"></canvas>


<script>


const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");


let W,H;


function resize(){

    W=canvas.width=innerWidth;
    H=canvas.height=innerHeight;

}

resize();
onresize=resize;



let state="menu";


let score=0;



const bird={

    x:120,
    y:0,

    size:18,

    velocity:0,

    gravity:0.45,

    jump:-8

};



let pipes=[];


let timer=0;



function reset(){

    bird.y=H/2;

    bird.velocity=0;

    pipes=[];

    score=0;

    timer=0;

}





function start(){

    state="play";

    reset();

}





function flap(){

    bird.velocity=bird.jump;

}




canvas.addEventListener("pointerdown",()=>{


if(state==="menu" ||
   state==="gameover"){

    start();

}

else if(state==="play"){

    flap();

}


});







function createPipe(){


let gap=170;


let top=Math.random()*
(H-gap-200)+50;



pipes.push({

    x:W,

    width:60,

    top:top,

    bottom:H-top-gap,

    passed:false

});


}





function collision(){


if(

bird.y<0 ||
bird.y+bird.size>H

)

return true;



for(let p of pipes){


if(

bird.x+bird.size>p.x &&

bird.x<p.x+p.width &&

(

bird.y<p.top ||

bird.y+bird.size>
H-p.bottom

)

)

return true;



}



return false;

}







function update(){


if(state!=="play")
return;



bird.velocity+=bird.gravity;

bird.y+=bird.velocity;




timer++;


if(timer>100){

    createPipe();

    timer=0;

}




for(let p of pipes){


p.x-=3;



if(!p.passed && p.x+p.width<bird.x){

    score++;

    p.passed=true;

}


}




pipes=pipes.filter(
p=>p.x+p.width>0
);



if(collision()){

    state="gameover";

}



}








function draw(){


ctx.fillStyle="#000";

ctx.fillRect(0,0,W,H);





// punteggio


ctx.fillStyle="white";

ctx.textAlign="center";

ctx.font="40px Arial";

ctx.fillText(
score,
W/2,
70
);





// tubi


ctx.fillStyle="white";


for(let p of pipes){


ctx.fillRect(

p.x,
0,
p.width,
p.top

);


ctx.fillRect(

p.x,
H-p.bottom,
p.width,
p.bottom

);


}






// uccello


ctx.fillRect(

bird.x,
bird.y,
bird.size,
bird.size

);








if(state==="menu"){


ctx.font="34px Arial";


ctx.fillText(
"MINIMAL FLAPPY",
W/2,
H/2-50
);



ctx.font="20px Arial";


ctx.fillText(
"tocca per iniziare",
W/2,
H/2+10
);



}





if(state==="gameover"){


ctx.font="38px Arial";


ctx.fillText(
"GAME OVER",
W/2,
H/2
);



ctx.font="20px Arial";


ctx.fillText(
"tocca per riprovare",
W/2,
H/2+45
);



}



}








menuBtn.onclick=()=>{


if(state==="play"){

state="pause";

pause.style.display="flex";

}


};



resume.onclick=()=>{


state="play";

pause.style.display="none";


};



exit.onclick=()=>{


state="menu";

pause.style.display="none";


};







function loop(){

update();

draw();

requestAnimationFrame(loop);

}


reset();

loop();


</script>


</body>
</html>
