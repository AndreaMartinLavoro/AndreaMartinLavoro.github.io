<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="spotify-carousel">

    <div class="carousel-wrapper">

        <button class="carousel-btn prev" aria-label="Playlist precedente">&#10094;</button>

        <div class="carousel"></div>

        <button class="carousel-btn next" aria-label="Playlist successiva">&#10095;</button>

    </div>

    <div class="info">

        <span class="tag">
            Spotify Playlist
        </span>

        <h2>Electronic Vibes</h2>

        <p>
            Una selezione di musica elettronica, synthwave e chill per lavorare,
            rilassarsi o programmare.
        </p>

        <a href="#" target="_blank" rel="noopener">
            Apri su Spotify
        </a>

    </div>

</section>

<script src="script.js"></script>
</body>
</html>
